<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AURION</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
background:#05010f;
color:white;
overflow-x:hidden;
}

/* ===== CINEMATIC START SCREEN ===== */
#intro{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center,#1a0033,#05010f);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
text-align:center;
}

#intro h1{
font-size:3rem;
background:linear-gradient(90deg,#b400ff,#00e0ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:fadeIn 2s ease;
}

#intro p{
opacity:0.8;
margin-top:10px;
}

#enterBtn{
margin-top:30px;
padding:12px 30px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#b400ff,#00e0ff);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

#enterBtn:hover{
transform:scale(1.1);
box-shadow:0 0 20px #b400ff;
}

/* ===== STAR BACKGROUND ===== */
.stars{
position:fixed;
width:100%;
height:100%;
background:transparent;
z-index:-1;
}

.stars::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:transparent;
box-shadow:
0 0 2px #fff,
100px 200px #fff,
300px 400px #aaa,
500px 100px #fff,
700px 300px #fff,
900px 600px #aaa,
1200px 200px #fff;
animation:move 60s linear infinite;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* ===== MAIN CONTENT ===== */
header{
text-align:center;
padding:60px 20px;
}

.logo{
width:120px;
height:120px;
border-radius:50%;
box-shadow:0 0 25px #b400ff;
animation:float 4s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

h1{
font-size:2.5rem;
margin-top:15px;
background:linear-gradient(90deg,#b400ff,#00e0ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* ===== MISSIONS ===== */
.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:40px;
}

.card{
width:280px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05) rotate(-1deg);
box-shadow:0 0 25px #00e0ff;
}

/* ===== SECRET ===== */
#secret{
display:none;
text-align:center;
padding:30px;
color:#00e0ff;
}

footer{
text-align:center;
padding:30px;
opacity:0.6;
}
</style>
</head>

<body>

<div id="intro">
<h1>AURION</h1>
<p>Enter the universe of creativity</p>
<button id="enterBtn">ENTER THE UNIVERSE</button>
</div>

<div class="stars"></div>

<header>
<img src="Untitled design_20260624_235615_0000.png" class="logo">
<h1>AURION</h1>
<p>Where creativity becomes a universe</p>
</header>

<div class="container">

<div class="card" onclick="mission(1)">
<h2>🚀 Mission 1</h2>
<p>Awaken inside AURION</p>
</div>

<div class="card" onclick="mission(2)">
<h2>✨ Mission 2</h2>
<p>Discover hidden energy</p>
</div>

<div class="card" onclick="mission(3)">
<h2>🪐 Mission 3</h2>
<p>Unlock the secret core</p>
</div>

</div>

<div id="secret">
<h2>🔐 SECRET UNLOCKED</h2>
<p>You found the hidden universe of AURION</p>
</div>

<footer>
© 2026 AURION
<br>
<a style="color:#00e0ff;text-decoration:none"
href="https://www.instagram.com/lc.oran?igsh=MTlvampoMnZqeGFjNw=="
target="_blank">
Visit LC Oran Instagram
</a>
</footer>

<script>
let progress = 0;

document.getElementById("enterBtn").onclick = () => {
document.getElementById("intro").style.display = "none";
};

function mission(id){
alert("Mission " + id + " completed!");
progress++;

if(progress >= 3){
document.getElementById("secret").style.display = "block";
}
}

// CLICK EASTER EGG
document.body.addEventListener("click", () => {
let star = document.createElement("div");
star.style.position="absolute";
star.style.width="6px";
star.style.height="6px";
star.style.background="#00e0ff";
star.style.borderRadius="50%";
star.style.left=Math.random()*window.innerWidth+"px";
star.style.top=Math.random()*window.innerHeight+"px";
star.style.boxShadow="0 0 10px #00e0ff";
document.body.appendChild(star);

setTimeout(()=>star.remove(),1000);
});
</script>

</body>
</html>
